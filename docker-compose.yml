services:
  db:
    image: pgvector/pgvector:pg16
    container_name: ai_ats_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_ats
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ai_ats_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: ai_ats_app
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: .
    container_name: ai_ats_worker
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: celery -A app.infrastructure.queue.celery_app worker --loglevel=info --concurrency=4

  beat:
    build: .
    container_name: ai_ats_beat
    restart: unless-stopped
    env_file: .env
    depends_on:
      - worker
    volumes:
      - .:/app
    command: celery -A app.infrastructure.queue.celery_app beat --loglevel=info

  flower:
    build: .
    container_name: ai_ats_flower
    restart: unless-stopped
    env_file: .env
    ports:
      - "5555:5555"
    depends_on:
      - worker
    command: celery -A app.infrastructure.queue.celery_app flower --port=5555

volumes:
  postgres_data:
  redis_data:
