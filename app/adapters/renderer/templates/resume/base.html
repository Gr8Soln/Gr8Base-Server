<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resume</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, Helvetica, sans-serif;
      font-size: 11pt;
      line-height: 1.5;
      color: #1a1a1a;
      background: #fff;
      max-width: 800px;
      margin: 0 auto;
      padding: 32px 40px;
    }
    h1 { font-size: 22pt; font-weight: 700; color: #111; }
    h2 {
      font-size: 11pt;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #2563eb;
      border-bottom: 1.5px solid #2563eb;
      padding-bottom: 2px;
      margin: 18px 0 8px;
    }
    h3 { font-size: 11pt; font-weight: 600; color: #111; }
    .contact {
      font-size: 9.5pt;
      color: #555;
      margin-top: 4px;
    }
    .contact a { color: #2563eb; text-decoration: none; }
    .section { margin-bottom: 6px; }
    .exp-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
    .exp-date { font-size: 9.5pt; color: #666; white-space: nowrap; }
    .exp-meta { font-size: 9.5pt; color: #666; margin-bottom: 4px; }
    ul { padding-left: 16px; margin: 4px 0; }
    li { margin-bottom: 2px; font-size: 10.5pt; }
    .skills-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 4px 12px;
      font-size: 10pt;
    }
    .skill-item::after { content: " •"; color: #ccc; }
    .skill-item:last-child::after { content: ""; }
    .project-name { font-weight: 600; }
    .tech-tags {
      font-size: 9pt;
      color: #555;
      margin-top: 2px;
    }
    @page {
      size: A4;
      margin: 18mm 20mm;
    }
    @media print {
      body { padding: 0; }
      h2 { page-break-after: avoid; }
      .exp-block { page-break-inside: avoid; }
    }
  </style>
</head>
<body>
  {% block content %}{% endblock %}
</body>
</html>
