name: CI

on:
  push:
    branches: [main, staging, dev]
  pull_request:
    branches: [main, staging, dev]

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dev dependencies
        run: |
          uv venv
          uv pip install ruff mypy

      - name: Ruff lint
        run: uv run ruff check app/ tests/

      - name: Ruff format check
        run: uv run ruff format --check app/ tests/

  test:
    name: Tests
    runs-on: ubuntu-latest

    env:
      APP_ENV: development
      APP_NAME: "Caros"
      APP_VERSION: "0.1.0"
      DEBUG: "true"
      SECRET_KEY: "ci-secret-key-minimum-32-characters-long"
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@localhost:5432/ai_ats_test"
      DATABASE_POOL_SIZE: "5"
      DATABASE_MAX_OVERFLOW: "10"
      REDIS_URL: "redis://localhost:6379/0"
      CELERY_BROKER_URL: "redis://localhost:6379/1"
      CELERY_RESULT_BACKEND: "redis://localhost:6379/2"
      JWT_SECRET: "ci-jwt-secret-minimum-32-characters-long"
      JWT_ALGORITHM: "HS256"
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      REFRESH_TOKEN_EXPIRE_DAYS: "30"
      OPENAI_API_KEY: "sk-placeholder"
      ANTHROPIC_API_KEY: "sk-ant-placeholder"
      LLM_PRIMARY_MODEL: "gpt-4o"
      LLM_FALLBACK_MODEL: "claude-3-5-sonnet-20241022"
      EMBEDDING_MODEL: "text-embedding-3-small"
      R2_ACCOUNT_ID: "placeholder"
      R2_ACCESS_KEY_ID: "placeholder"
      R2_SECRET_ACCESS_KEY: "placeholder"
      R2_BUCKET_NAME: "ai-ats-files"
      R2_PUBLIC_URL: "https://placeholder.r2.cloudflarestorage.com"
      LANGFUSE_PUBLIC_KEY: ""
      LANGFUSE_SECRET_KEY: ""
      SENTRY_DSN: ""
      ENCRYPTION_KEY: ""
      EMAIL_FROM: "noreply@localhost"

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ai_ats_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          uv venv
          uv pip install \
            "fastapi>=0.115.0" \
            "uvicorn[standard]>=0.30.0" \
            "pydantic>=2.7.0" \
            "pydantic-settings>=2.3.0" \
            "structlog>=24.0.0" \
            "sentry-sdk[fastapi]>=2.0.0" \
            "httpx>=0.27.0" \
            "sqlalchemy>=2.0.0" \
            "alembic>=1.13.0" \
            "asyncpg>=0.29.0" \
            "redis>=5.0.0" \
            "celery[redis]>=5.4.0" \
            "python-multipart>=0.0.9" \
            "cryptography>=42.0.0" \
            "pytest>=8.0.0" \
            "pytest-asyncio>=0.23.0" \
            "pytest-cov>=5.0.0"

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short --cov=app --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          fail_ci_if_error: false
